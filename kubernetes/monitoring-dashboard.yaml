# kubernetes/monitoring-dashboard.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-monitoring-dashboard
  labels:
    app: data-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-monitoring
  template:
    metadata:
      labels:
        app: data-monitoring
    spec:
      containers:
      - name: monitoring-dashboard
        image: data-monitoring-dashboard:latest
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: data-monitoring-service
spec:
  type: LoadBalancer
  ports:
    - port: 8501
      targetPort: 8501
  selector:
    app: data-monitoring
