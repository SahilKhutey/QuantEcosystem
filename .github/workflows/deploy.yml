name: Deploy Trading Terminal

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r trading_system/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run unit and integration tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest trading_system/tests/ --cov=trading_system --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v2
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v2
    
    - name: Build Docker image
    # Use the unified Dockerfile in the project root
      run: docker build -t trading-system:latest ./trading_system
      
    - name: Push to Container Registry
      run: |
        # In production: docker login and push to ECR/GCR/DockerHub
        echo "Pushing image..."

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml
    
    - name: Deploy to Kubernetes Cluster via Helm/Kubectl
      run: |
        kubectl apply -f trading_system/k8s/
        kubectl rollout status deployment/trading-system
