# .streamlit/config.toml

[server]
maxUploadSize = 200
headless = true
enableXsrfProtection = true
sanitizeHeaders = true
frameOrigin = "https://yourdomain.com"
# Correct CSP for Streamlit production
# Note: These headers are often better managed by an ALB or Reverse Proxy in production
# but can be defined here for standalone deployment.
csp = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"

[server.threadPool]
size = 50

[client]
outputLimit = 100

[logger]
level = "ERROR"

[browser]
gatherUsageStats = false
