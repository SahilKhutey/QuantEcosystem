# Alert rules (trading-system-rules.yml)
groups:
  - name: trading-system
    rules:
      - alert: HighDailyLoss
        expr: daily_loss > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High daily loss detected"
          description: "Daily loss of {{ $value }}% exceeds threshold of 5%"
      
      - alert: MaxDrawdown
        expr: drawdown > 0.15
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Maximum drawdown reached"
          description: "Account drawdown of {{ $value }}% exceeds threshold of 15%"
      
      - alert: APIErrorRate
        expr: api_error_rate > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "API error rate of {{ $value }}% exceeds threshold of 5%"
