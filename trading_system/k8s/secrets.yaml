apiVersion: v1
kind: Secret
metadata:
  name: trading-system-secrets
type: Opaque
stringData:
  alpaca-key: "YOUR_ALPACA_KEY"
  alpaca-secret: "YOUR_ALPACA_SECRET"
  twilio-sid: "YOUR_TWILIO_SID"
  twilio-token: "YOUR_TWILIO_TOKEN"
  smtp-user: "YOUR_SMTP_USER"
  smtp-password: "YOUR_PASSWORD"
  audit-encryption-key: "YOUR_ENCRYPTION_KEY"
