<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1" />
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blurred"/>
      <feMerge><feMergeNode in="blurred"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>

  <!-- Background glow ring -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)" opacity="0.5"/>

  <!-- Chart bars (rising) -->
  <rect x="96"  y="320" width="44" height="96"  rx="6" fill="rgba(59,130,246,0.25)"/>
  <rect x="152" y="276" width="44" height="140" rx="6" fill="rgba(59,130,246,0.35)"/>
  <rect x="208" y="236" width="44" height="180" rx="6" fill="rgba(59,130,246,0.45)"/>
  <rect x="264" y="192" width="44" height="224" rx="6" fill="url(#accent)" opacity="0.7"/>
  <rect x="320" y="148" width="44" height="268" rx="6" fill="url(#accent)" opacity="0.85"/>
  <rect x="376" y="96"  width="44" height="320" rx="6" fill="url(#accent)"/>

  <!-- Top trend line connecting bar peaks -->
  <polyline 
    points="118,320 174,276 230,236 286,192 342,148 398,96"
    fill="none" 
    stroke="#3b82f6" 
    stroke-width="4" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    opacity="0.8"
    filter="url(#blur-glow)"
  />

  <!-- Glow dots on peaks -->
  <circle cx="174" cy="276" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="286" cy="192" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="398" cy="96"  r="7" fill="#60a5fa"/>

  <!-- "Q" monogram bottom-left -->
  <text 
    x="72" y="472" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="40" 
    font-weight="800" 
    fill="#1d4ed8"
    opacity="0.8"
    letter-spacing="-1"
  >QUANTUM</text>
</svg>