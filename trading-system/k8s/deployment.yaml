apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-system
  labels:
    app: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-system
  template:
    metadata:
      labels:
        app: trading-system
    spec:
      containers:
      - name: trading-system
        image: trading-system:1.0
        env:
          - name: API_KEY
            valueFrom:
              secretKeyRef:
                name: trading-system-secrets
                key: alpaca-key
          - name: API_SECRET
            valueFrom:
              secretKeyRef:
                name: trading-system-secrets
                key: alpaca-secret
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15
        volumeMounts:
          - name: config-volume
            mountPath: /app/config
      volumes:
        - name: config-volume
          configMap:
            name: trading-system-config
---
apiVersion: v1
kind: Service
metadata:
  name: trading-system
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: trading-system
