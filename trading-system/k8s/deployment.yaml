apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-dashboard
  labels:
    app: trading-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-dashboard
  template:
    metadata:
      labels:
        app: trading-dashboard
    spec:
      containers:
      - name: trading-backend
        image: trading-system:latest
        command: ["python", "main.py"]
        env:
          - name: ALPACA_API_KEY
            valueFrom: { secretKeyRef: { name: trading-system-secrets, key: alpaca-key } }
          - name: ALPACA_SECRET_KEY
            valueFrom: { secretKeyRef: { name: trading-system-secrets, key: alpaca-secret } }
          - name: TWILIO_ACCOUNT_SID
            valueFrom: { secretKeyRef: { name: trading-system-secrets, key: twilio-sid } }
          - name: TWILIO_AUTH_TOKEN
            valueFrom: { secretKeyRef: { name: trading-system-secrets, key: twilio-token } }
        ports:
          - containerPort: 5000
      - name: trading-dashboard
        image: trading-system:latest
        command: ["streamlit", "run", "web/main.py"]
        env:
          - name: API_BASE_URL
            value: "http://localhost:5000/api"
        ports:
          - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: trading-system
spec:
  type: LoadBalancer
  ports:
    - name: api
      port: 5000
      targetPort: 5000
    - name: dashboard
      port: 8501
      targetPort: 8501
  selector:
    app: trading-dashboard
