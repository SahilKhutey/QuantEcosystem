# Prometheus Alerting Rules for Autonomous Trading System
groups:
  - name: autonomous-trading
    rules:
      - alert: HighDailyLoss
        expr: daily_loss > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High daily loss detected"
          description: "Daily loss of {{ $value }}% exceeds the threshold of 5%."
      
      - alert: MaxDrawdown
        expr: drawdown > 0.15
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Maximum drawdown reached"
          description: "Account drawdown of {{ $value }}% exceeds the threshold of 15%."
      
      - alert: APIErrorRate
        expr: api_error_rate > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "API error rate of {{ $value }}% exceeds the threshold of 5%."

      - alert: LowFillRate
        expr: fill_rate < 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low order fill rate"
          description: "Order fill rate of {{ $value }}% is below the institutional requirement of 90%."
