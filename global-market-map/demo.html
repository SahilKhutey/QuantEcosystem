<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market Intelligence Map | Real-time Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(22, 24, 35, 0.7);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --buy-color: #10b981;
            --sell-color: #ef4444;
            --neutral-color: #f59e0b;
        }
        body {
            margin: 0;
            background: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        #map { height: 100%; width: 100%; background: #0a0b10 !important; }
        .custom-popup .leaflet-popup-content-wrapper {
            background: rgba(16, 18, 27, 0.9);
            backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .custom-popup .leaflet-popup-tip { background: rgba(16, 18, 27, 0.9); }
        .signal-card {
            transition: all 0.3s ease;
        }
        .signal-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SignalCard = ({ signal }) => (
            <div className={`glass p-4 mb-3 border-l-4 signal-card ${
                signal.signal_type === 'BUY' ? 'border-emerald-500' : 
                signal.signal_type === 'SELL' ? 'border-rose-500' : 'border-amber-500'
            }`}>
                <div className="flex justify-between items-start mb-2">
                    <span className="font-bold text-lg font-outfit">{signal.asset}</span>
                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                        signal.signal_type === 'BUY' ? 'bg-emerald-500/20 text-emerald-400' : 
                        signal.signal_type === 'SELL' ? 'bg-rose-500/20 text-rose-400' : 'bg-amber-500/20 text-amber-400'
                    }`}>
                        {signal.signal_type}
                    </span>
                </div>
                <p className="text-xs text-slate-400 italic mb-2 line-clamp-2">"{signal.news_snippet}"</p>
                <div className="flex justify-between items-center text-[10px] text-slate-500">
                    <span className="flex items-center gap-1">
                        <i data-lucide="activity" className="w-3 h-3"></i>
                        Impact: {signal.impact}
                    </span>
                    <span>{new Date(signal.timestamp).toLocaleTimeString()}</span>
                </div>
            </div>
        );

        function App() {
            const [signals, setSignals] = useState([]);
            const [isConnected, setIsConnected] = useState(false);
            const mapRef = useRef(null);
            const markersRef = useRef({});

            useEffect(() => {
                // Initialize Map
                if (!mapRef.current) {
                    mapRef.current = L.map('map', { zoomControl: false }).setView([20, 0], 2.5);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; CARTO'
                    }).addTo(mapRef.current);
                }

                const connect = () => {
                    const ws = new WebSocket('ws://localhost:8000/ws/signals');
                    
                    ws.onopen = () => setIsConnected(true);
                    ws.onmessage = (event) => {
                        const signal = JSON.parse(event.data);
                        setSignals(prev => [signal, ...prev].slice(0, 15));
                        
                        // Add marker to map
                        const color = signal.signal_type === 'BUY' ? '#10b981' : signal.signal_type === 'SELL' ? '#ef4444' : '#f59e0b';
                        const icon = L.divIcon({
                            className: 'custom-icon',
                            html: `<div style="background-color: ${color}; width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 10px ${color}; border: 2px solid white;"></div>`,
                            iconSize: [10, 10]
                        });

                        const marker = L.marker([signal.lat, signal.lng], { icon })
                            .addTo(mapRef.current)
                            .bindPopup(`<div class="p-1"><b class="text-blue-400">${signal.asset}</b><br/><small class="text-slate-300">${signal.news_snippet}</small></div>`, { className: 'custom-popup' });
                        
                        setTimeout(() => marker.remove(), 60000); // Remove marker after 1 min
                    };
                    ws.onclose = () => {
                        setIsConnected(false);
                        setTimeout(connect, 3000);
                    };
                };

                connect();
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [signals]);

            return (
                <div className="flex h-screen w-full relative">
                    {/* Sidebar */}
                    <div className="w-80 h-full p-4 flex flex-col z-10">
                        <div className="glass h-full flex flex-col overflow-hidden shadow-2xl">
                            <div className="p-6 border-b border-white/5 bg-white/5">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="p-2 bg-blue-500/20 rounded-lg">
                                        <i data-lucide="globe" className="text-blue-400 w-6 h-6"></i>
                                    </div>
                                    <h1 className="text-xl font-bold font-outfit tracking-tight">MARKET INTEL</h1>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`} />
                                    <span className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">
                                        {isConnected ? 'Live Stream Active' : 'Connecting...'}
                                    </span>
                                </div>
                            </div>

                            <div className="p-4 overflow-y-auto flex-1 custom-scrollbar">
                                <div className="flex items-center justify-between mb-4 px-1">
                                    <h2 className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-2">
                                        <i data-lucide="trending-up" className="w-3 h-3"></i> REAL-TIME SIGNALS
                                    </h2>
                                    <span className="text-[10px] bg-white/5 px-2 py-0.5 rounded text-slate-500">LIVE</span>
                                </div>
                                
                                {signals.map(signal => (
                                    <SignalCard key={signal.id} signal={signal} />
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 h-full p-4 pl-0 relative">
                        <div className="glass h-full w-full overflow-hidden shadow-2xl relative">
                            <div id="map"></div>
                            
                            {/* Stats Overlay */}
                            <div className="absolute top-6 right-6 flex gap-4 z-[500]">
                                <div className="glass px-6 py-4 flex items-center gap-4 bg-[#0a0b10]/80">
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Sentiment</p>
                                        <p className="text-lg font-bold text-blue-400 font-outfit leading-none">NEUTRAL</p>
                                    </div>
                                    <i data-lucide="bar-chart-2" className="text-blue-400 w-6 h-6"></i>
                                </div>
                                <div className="glass px-6 py-4 flex items-center gap-4 bg-[#0a0b10]/80">
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Market State</p>
                                        <p className="text-lg font-bold text-emerald-400 font-outfit leading-none">ACTIVE</p>
                                    </div>
                                    <i data-lucide="activity" className="text-emerald-400 w-6 h-6"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
